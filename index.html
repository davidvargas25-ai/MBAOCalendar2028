<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-MBA Online 2028 · Calendario Interactivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#ffffff; --paper2:#eef3fb; --ink:#16266e; --ink-soft:#5a6692;
  --line:#d7e0f2; --accent:#2e8fd6; --accent2:#1f6fb0; --gold:#b5852a;
  --bg1:#18286f; --bg2:#101d52; --on-dark:#e8eefb; --on-dark-soft:#aab6dd;
  --shadow:0 1px 0 rgba(0,0,0,.04),0 8px 28px -16px rgba(40,30,20,.35);
  --c-incae:#b5852a;
  --c-lider:#8a2f57;
  --c-creavalor:#2f8f7a;
  --c-introconta:#3a5a9c;
  --c-matefin:#7a3fa0;
  --c-introanalit:#0f8a8a;
  --c-pensa:#b4521c;
  --c-cs:#5c7a23;
  --c-evol:#2f9c4a;
  --c-analit:#2f6db5;
  --c-comunlid:#c43b8a;
  --c-contafin:#9c7a1e;
  --c-finanzas:#2f7d3f;
  --c-gerencia:#b03a2f;
  --c-datamodels:#6a4ad0;
  --c-orgind:#1f6f8c;
  --c-grupoest:#1f9cc4;
  --c-act:#8a857c;
}
*{box-sizing:border-box}
body{margin:0;background:
   radial-gradient(circle at 12% 6%, rgba(46,143,214,.16), transparent 42%),
   radial-gradient(circle at 90% 96%, rgba(46,143,214,.12), transparent 44%),
   linear-gradient(160deg,var(--bg1),var(--bg2));
  background-attachment:fixed;
  color:var(--on-dark);font-family:'Archivo',sans-serif;line-height:1.45;-webkit-font-smoothing:antialiased;overflow:hidden}
html,body{height:100%}
.wrap{max-width:1320px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;padding:12px 16px}
.topbar{flex:0 0 auto;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:10px 14px;margin-bottom:10px;box-shadow:0 10px 26px -14px rgba(0,0,0,.5)}
header.top{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);padding-bottom:8px}
.brand .kicker{font-size:.62rem;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);font-weight:700}
.brand h1{font-family:'Fraunces',serif;font-weight:700;font-size:1.05rem;line-height:1;margin:0;color:var(--ink)}
.brand .sub{display:none}
.range-badge{font-family:'Fraunces',serif;font-style:italic;font-size:.9rem;color:var(--ink-soft);text-align:right}
.range-badge b{display:block;font-style:normal;font-weight:600;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);margin-bottom:1px}
.controls{margin-top:10px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px 12px;background:var(--paper2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.ctl label{display:block;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--ink-soft);margin-bottom:3px}
select{width:100%;padding:6px 9px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);font-size:.82rem;cursor:pointer;font-family:'Archivo',sans-serif}
select:focus{outline:2px solid var(--accent);outline-offset:1px}
select:disabled{opacity:.5;cursor:not-allowed}
.seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.seg button{border:0;background:transparent;padding:6px 12px;border-radius:7px;font-size:.8rem;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.15s;font-family:'Archivo',sans-serif}
.seg button.active{background:var(--accent);color:#fff}
.toggle{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;font-size:.82rem;font-weight:600;color:var(--ink);margin-top:16px}
.toggle input{appearance:none;width:40px;height:22px;background:var(--line);border-radius:20px;position:relative;cursor:pointer;transition:.2s;flex:0 0 auto}
.toggle input:checked{background:var(--accent)}
.toggle input::after{content:"";position:absolute;width:17px;height:17px;border-radius:50%;background:#fff;top:2.5px;left:2.5px;transition:.2s}
.toggle input:checked::after{left:20px}
.navbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;flex-wrap:wrap}
.navbar .title{font-size:.84rem;color:var(--ink-soft);font-weight:500}
.navbar .title b{font-family:'Fraunces',serif;color:var(--ink);font-weight:600;font-style:italic}
#calArea{flex:1 1 auto;min-height:0;overflow-y:auto;position:relative;padding:2px 2px 12px}
/* Bloques (mes / semana) */
.section{margin-top:18px}
.section:first-child{margin-top:2px}
.section-head{display:flex;align-items:baseline;gap:12px;border-bottom:1px solid rgba(255,255,255,.22);padding-bottom:8px;margin-bottom:12px;position:sticky;top:0;background:linear-gradient(180deg,var(--bg1) 82%,transparent);z-index:6}
.section-head .sh-title{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(1.15rem,2.6vw,1.6rem);line-height:1;color:var(--on-dark);text-transform:capitalize}
.section-head .sh-sub{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--accent)}
.section-head .sh-count{margin-left:auto;font-size:.76rem;color:var(--on-dark-soft);font-variant-numeric:tabular-nums}
.nav-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.nav-btns button{border:1px solid var(--line);background:#fff;width:40px;height:36px;border-radius:9px;font-size:1rem;cursor:pointer;color:var(--ink);transition:.15s}
.nav-btns button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.today-btn{width:auto!important;padding:0 14px;font-size:.8rem!important;font-weight:600;height:36px}
.today-btn.active{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
.view-toggle{margin-left:auto}
/* ===== Rejilla de 7 columnas por día de la semana ===== */
.weekhead{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin:0 0 6px;padding:0 2px}
.weekhead span{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--on-dark-soft)}
.weekrow{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px;align-items:start}
.daycell{display:flex;flex-direction:column;gap:5px;min-height:30px;border-radius:10px;padding:2px}
.daycell.noev{opacity:.4}
.daycell.out{visibility:hidden}
.daycell.today{outline:2px solid var(--accent);outline-offset:2px}
.daycell .dch{display:flex;align-items:baseline;gap:5px;padding:1px 3px 0;line-height:1}
.daycell .dcn{font-family:'Fraunces',serif;font-weight:700;font-size:.95rem;color:var(--on-dark)}
.daycell .dcsub{font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--on-dark-soft);font-weight:600}
.daycell.weekend .dcn{color:var(--on-dark-soft)}
.daycell.today .dcn{color:var(--accent)}
/* ===== Cajas de evento (compactas) ===== */
.ev{border-left:3px solid var(--cc,var(--c-act));background:color-mix(in srgb,var(--cc,var(--c-act)) 12%,#fff);border-radius:6px;padding:5px 7px;display:flex;flex-direction:column;gap:1px}
.ev .t{font-weight:700;color:var(--cc);font-variant-numeric:tabular-nums;font-size:.72rem;letter-spacing:.01em}
.ev .n{color:var(--ink);font-weight:600;font-size:.76rem;line-height:1.2;overflow-wrap:anywhere;white-space:normal}
.ev .ti{color:var(--ink);font-weight:500;font-size:.72rem;line-height:1.2;overflow-wrap:anywhere;white-space:normal}
.ev .meta{font-size:.66rem;color:var(--ink-soft);line-height:1.25;overflow-wrap:anywhere;white-space:normal}
.ev .meta b{color:var(--ink);font-weight:600}
.ev .xday{color:var(--accent2);font-weight:700}
.ev .meta .xday{color:var(--accent2)}
.ev .glist{list-style:none;margin:3px 0 0;padding:0;display:flex;flex-direction:column;gap:3px}
.ev .glist li{font-size:.72rem;color:var(--ink);line-height:1.25;overflow-wrap:anywhere}
.ev .glist .gt{font-weight:700;color:var(--cc);font-variant-numeric:tabular-nums;font-size:.7rem;margin-right:3px}
.empty-msg{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--on-dark-soft);font-style:italic;font-family:'Fraunces',serif}
.legend{flex:0 0 auto;margin-top:8px;border-top:1px solid rgba(255,255,255,.2);padding-top:8px;max-height:80px;overflow-y:auto}
.legend h3{font-family:'Fraunces',serif;font-weight:600;font-size:.82rem;margin:0 0 6px;color:var(--on-dark)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:var(--on-dark);padding:4px 9px 4px 7px;border-radius:30px}
.chip .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.chip .cnt{color:var(--on-dark-soft);font-variant-numeric:tabular-nums;font-weight:700}
.chip .prof{color:var(--on-dark-soft);font-style:italic}
.tzline{margin-top:6px;font-size:.74rem;color:var(--ink-soft)}
.tzline b{color:var(--accent2)}
@media(max-width:820px){.weekhead{display:none}.weekrow{grid-template-columns:1fr}.daycell.noev,.daycell.out{display:none}.daycell .dch{border-bottom:1px solid var(--line);padding-bottom:3px}}
@media(max-width:760px){.brand h1{font-size:1.15rem}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
  <header class="top">
    <div class="brand"><h1>Calendario MBAO 2028</h1></div>
    <div class="nav-btns" id="actionBtns">
      <button id="btnReload" class="today-btn" title="Vuelve a leer la hoja de Google Sheets">&#x21bb; Actualizar datos</button>
      <button id="btnTasks" class="today-btn" title="Muestra únicamente entregables / tareas">&#9745; Solo entregables</button>
      <button id="btnExams" class="today-btn" title="Muestra únicamente exámenes">&#9998; Solo exámenes</button>
      <button id="btnClear" class="today-btn" title="Restablece materia, profesor, día, mes, semana, entregables y exámenes">&#10005; Limpiar filtros</button>
    </div>
  </header>
  <div class="controls">
    <div class="ctl"><label>Mes</label><select id="fMes"></select></div>
    <div class="ctl"><label>Semana</label><select id="fSemana"></select></div>
    <div class="ctl"><label>Asignatura / Materia</label><select id="fMateria"></select></div>
    <div class="ctl"><label>Profesor</label><select id="fProf"></select></div>
    <div class="ctl"><label>Día de la semana</label>
      <select id="fDay">
        <option value="all">Todos los días</option>
        <option value="1">Lunes</option><option value="2">Martes</option>
        <option value="3">Miércoles</option><option value="4">Jueves</option>
        <option value="5">Viernes</option><option value="6">Sábado</option>
        <option value="0">Domingo</option>
      </select>
    </div>
    <div class="ctl"><label>Zona horaria</label>
      <select id="fTz">
        <option value="-6" selected>Centroamérica (UTC&minus;6)</option>
        <option value="-5">Sudamérica (UTC&minus;5)</option>
      </select>
    </div>
    <div class="ctl"><label class="toggle"><input type="checkbox" id="fWeekend"> Solo fines de semana</label></div>
  </div>
  <div class="tzline" id="tzLine"></div>
  <div class="navbar">
    <div class="title" id="periodTitle"></div>
    <div class="seg view-toggle">
      <button data-view="month" class="active">Agrupar por mes</button>
      <button data-view="week">Agrupar por semana</button>
    </div>
  </div>
  </div><!-- /topbar -->
  <div id="calArea"></div>
  <div class="legend"><h3>Asignaturas en este periodo</h3><div class="chips" id="legendChips"></div></div>
</div>
<script>
const SUBJ = {
  incae:{name:"INCAE on IA", color:"var(--c-incae)", prof:"Juan Carlos Barahona"},
  lider:{name:"Liderazgo", color:"var(--c-lider)", prof:"Margaret Grigsby"},
  creavalor:{name:"Introducción a la Creación de Valor", color:"var(--c-creavalor)", prof:"Carlos Rodríguez / José Humberto Torres"},
  introconta:{name:"Introducción a la Contabilidad", color:"var(--c-introconta)", prof:"Arnoldo Rodríguez"},
  matefin:{name:"Matemáticas Financieras", color:"var(--c-matefin)", prof:"Felipe Pérez"},
  introanalit:{name:"Introducción a la Analítica de datos", color:"var(--c-introanalit)", prof:"Florian Federspiel"},
  pensa:{name:"Pensamiento Crítico y Toma de Decisiones", color:"var(--c-pensa)", prof:"Octavio Martínez"},
  cs:{name:"Computer Science for Business", color:"var(--c-cs)", prof:"Andrey Elizondo"},
  evol:{name:"Evolución digital", color:"var(--c-evol)", prof:"Juan Carlos Barahona"},
  analit:{name:"Analítica de datos", color:"var(--c-analit)", prof:"Diego Murillo"},
  comunlid:{name:"Comunicación y Liderazgo", color:"var(--c-comunlid)", prof:"María Elena Carballo"},
  contafin:{name:"Contabilidad Financiera", color:"var(--c-contafin)", prof:"José Humberto Torres"},
  finanzas:{name:"Finanzas I", color:"var(--c-finanzas)", prof:"Luis Noel Alfaro"},
  gerencia:{name:"Gerencia de operaciones", color:"var(--c-gerencia)", prof:"Bernard Kilian"},
  datamodels:{name:"Data models and decisions", color:"var(--c-datamodels)", prof:"Florian Federspiel"},
  orgind:{name:"Organización Industrial", color:"var(--c-orgind)", prof:"Conrado Cuevas"},
  grupoest:{name:"Grupo de Estudio", color:"var(--c-grupoest)", prof:"CAE"},
  act:{name:"Actividades y logística", color:"var(--c-act)", prof:"—"}
};

// ===== Capa de datos en vivo: lee la hoja publicada de Google Sheets =====
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQq3sXfPTvpFc29omeHSN6DL-IvhUlzucQe835MoL02vOLoa2rz1tF2IlNmw6bxP6PpYXDFpmrTMl6W/pub?gid=73764161&single=true&output=csv";

let EVENTS=[];

// Parser CSV (maneja comillas, comas dentro de campos y comillas escapadas "")
function parseCSV(text){
  const rows=[];let row=[],field="",i=0,inQ=false;
  while(i<text.length){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else {inQ=false;} }
      else field+=c;
    }else{
      if(c==='"')inQ=true;
      else if(c===',') {row.push(field);field="";}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field="";}
      else if(c==='\r'){}
      else field+=c;
    }
    i++;
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows;
}
function hmToMin(s){const m=(s||"").trim().match(/^(\d{1,2}):(\d{2})/);return m?(+m[1])*60+(+m[2]):null;}

// Mapeo nombre de asignatura -> clave (para color). Asignaturas nuevas reciben clave y color de reserva.
const nameToKey={};
Object.entries(SUBJ).forEach(([k,v])=>{nameToKey[v.name.trim().toLowerCase()]=k;});
const FALLBACK_COLORS=["#8a5a2f","#2f5a8a","#5a8a2f","#8a2f8a","#2f8a8a","#8a8a2f","#b04a6a"];
let fbIdx=0;
function ensureSubj(name){
  const key=(name||"").trim().toLowerCase();
  if(nameToKey[key])return nameToKey[key];
  const nk="auto"+Object.keys(SUBJ).length;
  SUBJ[nk]={name:(name||"").trim()||"Sin asignatura",color:FALLBACK_COLORS[fbIdx++%FALLBACK_COLORS.length],prof:""};
  nameToKey[key]=nk;
  return nk;
}

async function loadData(){
  const calArea=document.getElementById("calArea");
  calArea.innerHTML='<div class="empty-msg">Cargando datos desde Google Sheets&hellip;</div>';
  try{
    const res=await fetch(CSV_URL+"&_="+Date.now(),{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const text=await res.text();
    let rows=parseCSV(text).filter(r=>r.length>=4 && (r[0]||"").trim());
    if(rows.length && /fecha/i.test(rows[0][0])) rows.shift(); // descarta encabezado
    const evs=[];
    rows.forEach(r=>{
      const fecha=(r[0]||"").trim();
      const dm=fecha.match(/^(\d{4})-(\d{2})-(\d{2})/);
      const mi=hmToMin(r[1]);
      if(!dm||mi==null)return;
      const mf=hmToMin(r[2]);
      const subj=ensureSubj((r[3]||"").trim()||"Actividades y logística");
      const profe=(r[4]||"").trim();
      evs.push({y:+dm[1],m:(+dm[2])-1,d:+dm[3],dateKey:fecha,min:mi,end:(mf==null?mi:mf),
        subj:subj,label:(r[5]||"").trim(),ses:(r[6]||"").trim(),loc:(r[7]||"").trim(),
        tipo:(r[8]||"").trim(),
        prof:(profe||SUBJ[subj].prof||"\u2014")});
    });
    EVENTS=evs;
    const lc=document.getElementById("liveCount");if(lc)lc.textContent=EVENTS.length;
    initFilters();
    applyStateToControls();
    render();
    requestAnimationFrame(scrollToToday);
  }catch(err){
    EVENTS=[];
    const msg=(err&&err.message)?err.message:String(err);
    const isHttp=/HTTP\s+\d/.test(msg);
    const cuerpo = isHttp
      ? '<b>La hoja de Google Sheets respondi&oacute; con un error ('+msg+').</b><br><br>'+
        'Esto suele pasar cuando la hoja se reimport&oacute; o cambi&oacute; de pesta&ntilde;a y la publicaci&oacute;n dej&oacute; de ser v&aacute;lida. '+
        'Vuelve a publicarla (Archivo &rarr; Compartir &rarr; Publicar en la web) y actualiza la URL del calendario.'
      : '<b>No se pudieron cargar los datos.</b><br><br>'+
        'Causa probable: el archivo se abri&oacute; desde el disco (file://) y el navegador bloquea la conexi&oacute;n, o no hay conexi&oacute;n a internet.<br><br>'+
        '&Aacute;brelo por su enlace https (hosting), no como archivo local.';
    calArea.innerHTML='<div class="empty-msg" style="text-align:left;max-width:640px;margin:0 auto">'+
      cuerpo+'<br><br><small>Detalle t&eacute;cnico: '+msg+'</small></div>';
  }
}


const BASE_TZ=-6;
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DOWS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const DOWL=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const state={view:"month", cur:new Date(2026,4,1), weekStart:startOfWeek(new Date(2026,4,4)),
  materia:"all", prof:"all", day:"all", month:"all", week:"all", tz:-6, weekend:false, task:false, exam:false, tzLabel:"Costa Rica (UTC\u22126)"};
// ===== Memoria de filtros: recuerda lo seleccionado al recargar =====
const STORE_KEY="mbao2028_filtros";
function saveState(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify({
    view:state.view, materia:state.materia, prof:state.prof, day:state.day,
    month:state.month, week:state.week, weekend:state.weekend, task:state.task, exam:state.exam,
    tzIdx:document.getElementById("fTz").selectedIndex
  }));}catch(e){}
}
function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem(STORE_KEY)||"null");
    if(!s)return;
    if(s.view)state.view=s.view;
    if(s.materia)state.materia=s.materia;
    if(s.prof)state.prof=s.prof;
    if(s.day)state.day=s.day;
    if(s.month)state.month=s.month;
    if(s.week)state.week=s.week;
    if(typeof s.weekend==="boolean")state.weekend=s.weekend;
    if(typeof s.task==="boolean")state.task=s.task;
    if(typeof s.exam==="boolean")state.exam=s.exam;
    if(s.tzIdx!=null)state._tzIdx=s.tzIdx;
  }catch(e){}
}
// Selecciona un valor en un <select>; si la opción ya no existe, cae en "all"
function setSel(el,val){ el.value=val; if(el.value!==val){el.value="all";return "all";} return val; }
// Reaplica el estado a los controles del DOM (tras reconstruir las opciones)
function applyStateToControls(){
  const g=id=>document.getElementById(id);
  document.querySelectorAll(".seg.view-toggle button").forEach(b=>b.classList.toggle("active",b.dataset.view===state.view));
  state.materia=setSel(fMateria,state.materia);
  state.prof=setSel(fProf,state.prof);
  state.day=setSel(g("fDay"),state.day);
  state.month=setSel(fMes,state.month);
  if(state._tzIdx!=null && g("fTz").options[state._tzIdx]){
    g("fTz").selectedIndex=state._tzIdx;
    state.tz=Number(g("fTz").value);
    state.tzLabel=g("fTz").options[g("fTz").selectedIndex].text.replace(/ \u00b7.*/,'').trim();
  }
  g("fWeekend").checked=state.weekend;
  const bt=g("btnTasks");if(bt)bt.classList.toggle("active",!!state.task);
  const bx=g("btnExams");if(bx)bx.classList.toggle("active",!!state.exam);
  g("fDay").disabled=state.weekend;
  populateWeeks();
  state.week=setSel(g("fSemana"),state.week);
}
function startOfWeek(dt){const x=new Date(dt);x.setHours(0,0,0,0);const day=x.getDay();x.setDate(x.getDate()+(day===0?-6:1-day));return x;}
function pad(n){return String(n).padStart(2,"0");}
function keyOf(dt){return dt.getFullYear()+"-"+pad(dt.getMonth()+1)+"-"+pad(dt.getDate());}
function shiftMin(min, tz){return min + (tz - BASE_TZ)*60;}
function fmtTime(min){let t=((min%1440)+1440)%1440;let h=Math.floor(t/60),m=t%60;const ap=h>=12?"pm":"am";let hh=h%12;if(hh===0)hh=12;return m===0?(hh+ap):(hh+":"+pad(m)+ap);}

const fMateria=document.getElementById("fMateria");
const fProf=document.getElementById("fProf");
const fMes=document.getElementById("fMes");
// Rellena los desplegables a partir de los datos ya cargados (se llama dentro de loadData)
function initFilters(){
  const usedSubj=new Set(EVENTS.map(e=>e.subj));
  fMateria.innerHTML='<option value="all">Todas las asignaturas</option>'+
    Object.entries(SUBJ).filter(([k])=>usedSubj.has(k)).map(([k,v])=>'<option value="'+k+'">'+v.name+'</option>').join("");
  const profs=[...new Set(EVENTS.map(e=>e.prof))].filter(p=>p&&p!=="\u2014").sort((a,b)=>a.localeCompare(b,'es'));
  fProf.innerHTML='<option value="all">Todos los profesores</option>'+profs.map(p=>'<option value="'+p+'">'+p+'</option>').join("");
  const monthKeys=[...new Set(EVENTS.map(e=>e.y+"-"+pad(e.m+1)))].sort();
  fMes.innerHTML='<option value="all">Todos los meses</option>'+
    monthKeys.map(k=>{const [y,m]=k.split("-");return '<option value="'+k+'">'+MONTHS[Number(m)-1]+' '+y+'</option>';}).join("");
  populateWeeks();
}

const fSemana=document.getElementById("fSemana");
function fmtWeekLabel(mon,sun){
  return mon.getDate()+" de "+MONTHS[mon.getMonth()].toLowerCase()+" \u2013 "+sun.getDate()+" de "+MONTHS[sun.getMonth()].toLowerCase();
}
function populateWeeks(){
  if(state.month==="all"){
    fSemana.innerHTML='<option value="all">Elige un mes primero</option>';
    fSemana.disabled=true; state.week="all"; return;
  }
  fSemana.disabled=false;
  const [y,m]=state.month.split("-").map(Number);
  const firstDay=new Date(y,m-1,1), lastDay=new Date(y,m,0);
  let cur=startOfWeek(firstDay);
  let opts='<option value="all">Todas las semanas</option>';
  while(cur<=lastDay){
    const mon=new Date(cur), sun=new Date(cur);sun.setDate(sun.getDate()+6);
    opts+='<option value="'+keyOf(mon)+'">'+fmtWeekLabel(mon,sun)+'</option>';
    cur.setDate(cur.getDate()+7);
  }
  fSemana.innerHTML=opts;
}

// Una fila es entregable/tarea si su columna Tipo contiene "entreg" o "tarea"
function isTask(e){return /entreg|tarea/.test((e.tipo||"").toLowerCase());}
function isExam(e){return (e.tipo||"").trim().toLowerCase()==="examen";}
function passFilters(e, dt){
  if(state.task && !isTask(e)) return false;
  if(state.exam && !isExam(e)) return false;
  if(state.week!=="all"){
    const ms=new Date(state.week+"T00:00:00"), me=new Date(ms);me.setDate(me.getDate()+6);
    if(dt<ms||dt>me) return false;
  } else if(state.month!=="all" && (dt.getFullYear()+"-"+pad(dt.getMonth()+1))!==state.month) return false;
  if(state.materia!=="all" && e.subj!==state.materia) return false;
  if(state.prof!=="all" && e.prof!==state.prof) return false;
  const dow=dt.getDay();
  if(state.weekend && !(dow===0||dow===6)) return false;
  if(state.day!=="all" && dow!==Number(state.day)) return false;
  return true;
}
function eventsByDay(dateKey){
  return EVENTS.filter(e=>e.dateKey===dateKey).map(e=>({...e,dispMin:shiftMin(e.min,state.tz),dispEnd:(e.end!=null?shiftMin(e.end,state.tz):null)})).sort((a,b)=>a.dispMin-b.dispMin);
}
const calArea=document.getElementById("calArea");
const periodTitle=document.getElementById("periodTitle");
function tip(e){let s=SUBJ[e.subj].name;if(e.prof!=="\u2014")s+=" \u00b7 "+e.prof;if(e.ses)s+=" \u00b7 Sesi\u00f3n "+e.ses;return s.replace(/"/g,"&quot;");}
function timeRange(e){const a=fmtTime(e.dispMin);if(e.dispEnd!=null&&e.dispEnd!==e.dispMin)return a+" \u2013 "+fmtTime(e.dispEnd);return a;}
function evHTML(e){
  const c=SUBJ[e.subj].color;
  if(isTask(e)){
    // Entregable: ficha reducida (hora de fin, asignatura, título, profesor).
    // Si por el huso la hora de fin cruza de fecha, mantenemos la hora de Costa Rica
    // y avisamos del margen extra; si no cruza, se muestra la hora convertida normal.
    const diff=state.tz-BASE_TZ;
    const endConv=(e.dispEnd!=null?e.dispEnd:e.dispMin); // hora de fin convertida al huso del lector
    const endCR=(e.end!=null?e.end:e.min);               // hora de fin en Costa Rica
    const crosses=endConv>=1440||endConv<0;              // cambia de día al convertir
    const showMin=crosses?endCR:endConv;
    let meta=[];
    if(e.prof!=="\u2014")meta.push('<b>Prof.</b> '+e.prof);
    if(crosses&&diff>0)meta.push('<b class="xday">Por husos horarios</b> tienes '+diff+' hora'+(diff===1?'':'s')+' m\u00e1s para finalizar esta tarea.');
    return '<div class="ev" style="--cc:'+c+'" title="'+tip(e)+'">'+
      '<span class="t">Entrega \u00b7 '+fmtTime(showMin)+(crosses?' <span class="xday">(hora CR)</span>':'')+'</span>'+
      '<span class="n">'+SUBJ[e.subj].name+'</span>'+
      (e.label?'<span class="ti">'+e.label+'</span>':'')+
      (meta.length?'<span class="meta">'+meta.join(" \u00b7 ")+'</span>':'')+
      '</div>';
  }
  const cross=e.dispMin>=1440; // la hora convertida cae en la madrugada del día siguiente
  let meta=[];
  if(e.prof!=="\u2014")meta.push('<b>Prof.</b> '+e.prof);
  if(e.ses)meta.push('<b>Sesi\u00f3n</b> '+e.ses);
  if(e.loc)meta.push('<b>Aula</b> '+e.loc);
  if(e.tipo)meta.push('<b>Tipo</b> '+e.tipo);
  if(cross)meta.push('<b class="xday">Aviso:</b> esta hora ya es de la madrugada del d\u00eda siguiente en tu huso; la fecha mostrada arriba es la que corresponde (hora Costa Rica).');
  return '<div class="ev" style="--cc:'+c+'" title="'+tip(e)+'">'+
    '<span class="t">'+timeRange(e)+(cross?' <span class="xday">(d\u00eda sig.)</span>':'')+'</span>'+
    '<span class="n">'+SUBJ[e.subj].name+'</span>'+
    (meta.length?'<span class="meta">'+meta.join(" \u00b7 ")+'</span>':'')+
    '</div>';
}
/* Caja agrupada de entregables (misma asignatura + profesor en el día) */
function groupTaskHTML(items){
  const c=SUBJ[items[0].subj].color, prof=items[0].prof, diff=state.tz-BASE_TZ;
  let anyCross=false;
  const lis=items.map(e=>{
    const endConv=(e.dispEnd!=null?e.dispEnd:e.dispMin);
    const endCR=(e.end!=null?e.end:e.min);
    const crosses=endConv>=1440||endConv<0;
    if(crosses)anyCross=true;
    const showMin=crosses?endCR:endConv;
    const t=fmtTime(showMin)+(crosses?' <span class="xday">(hora CR)</span>':'');
    return '<li><span class="gt">'+t+'</span>'+(e.label||'(sin t\u00edtulo)')+'</li>';
  }).join("");
  let meta=[];
  if(prof!=="\u2014")meta.push('<b>Prof.</b> '+prof);
  if(anyCross&&diff>0)meta.push('<b class="xday">Por husos horarios</b> tienes '+diff+' hora'+(diff===1?'':'s')+' m\u00e1s para finalizar estas tareas.');
  return '<div class="ev evgroup" style="--cc:'+c+'" title="'+SUBJ[items[0].subj].name+'">'+
    '<span class="t">Entregas \u00b7 '+items.length+'</span>'+
    '<span class="n">'+SUBJ[items[0].subj].name+'</span>'+
    '<ul class="glist">'+lis+'</ul>'+
    (meta.length?'<span class="meta">'+meta.join(" \u00b7 ")+'</span>':'')+
    '</div>';
}
/* Arma los eventos de un día: agrupa entregables por asignatura+profesor; el resto normal */
function renderDayEvents(evs){
  const groups={}, units=[];
  evs.forEach(e=>{
    if(isTask(e)){
      const key=e.subj+"|"+(e.prof||"");
      (groups[key]=groups[key]||[]).push(e);
    }else{
      units.push({min:e.dispMin, html:evHTML(e)});
    }
  });
  Object.keys(groups).forEach(k=>{
    const items=groups[k].slice().sort((a,b)=>a.dispMin-b.dispMin);
    units.push({min:items[0].dispMin, html: items.length>1?groupTaskHTML(items):evHTML(items[0])});
  });
  units.sort((a,b)=>a.min-b.min);
  return units.map(u=>u.html).join("");
}
/* Celda de un día dentro de la rejilla de 7 columnas */
const WEEKHEAD='<div class="weekhead">'+["Lun","Mar","Mi\u00e9","Jue","Vie","S\u00e1b","Dom"].map(d=>'<span>'+d+'</span>').join("")+'</div>';
function dayCellHTML(dt, restrictMonth){
  const dk=keyOf(dt), dow=dt.getDay();
  const inScope = !restrictMonth || (dt.getFullYear()+"-"+pad(dt.getMonth()+1))===restrictMonth;
  const evs = inScope ? eventsByDay(dk).filter(e=>passFilters(e,dt)) : [];
  const today = dk===keyOf(new Date());
  const cls=["daycell"];
  if(dow===0||dow===6)cls.push("weekend");
  if(today)cls.push("today");
  if(!inScope)cls.push("out");
  if(!evs.length)cls.push("noev");
  return {html:'<div class="'+cls.join(' ')+'" data-date="'+dk+'">'+
    '<div class="dch"><span class="dcn">'+dt.getDate()+'</span><span class="dcsub">'+DOWS[dow]+' \u00b7 '+MONTHS[dt.getMonth()].slice(0,3)+'</span></div>'+
    renderDayEvents(evs)+
    '</div>', count:evs.length};
}
/* Fila de una semana: 7 columnas Lun..Dom */
function weekRowHTML(weekStart, restrictMonth){
  let cells="",count=0;
  for(let i=0;i<7;i++){
    const dt=new Date(weekStart);dt.setDate(dt.getDate()+i);
    const c=dayCellHTML(dt,restrictMonth);
    cells+=c.html;count+=c.count;
  }
  return {html:'<div class="weekrow">'+cells+'</div>', count};
}
/* Date range spanning the whole dataset. */
function datasetBounds(){
  let min=null,max=null;
  EVENTS.forEach(e=>{const dt=new Date(e.y,e.m,e.d);if(!min||dt<min)min=dt;if(!max||dt>max)max=dt;});
  return [min,max];
}
function plural(n){return n===1?"1 sesión":n+" sesiones";}

/* MODO MES: cada mes como bloque; sus semanas en filas de 7 columnas. */
function renderMonth(){
  const [min,max]=datasetBounds();
  let html="",totalEv=0,blocks=0;
  let y=min.getFullYear(),m=min.getMonth();
  while(y<max.getFullYear() || (y===max.getFullYear() && m<=max.getMonth())){
    const monthKey=y+"-"+pad(m+1);
    const lastDay=new Date(y,m+1,0);
    let cur=startOfWeek(new Date(y,m,1)), rows="", count=0;
    while(cur<=lastDay){
      const wr=weekRowHTML(cur,monthKey);
      if(wr.count){rows+=wr.html;count+=wr.count;}
      cur.setDate(cur.getDate()+7);
    }
    if(count){
      blocks++;totalEv+=count;
      html+='<div class="section"><div class="section-head">'+
        '<span class="sh-title">'+MONTHS[m]+' '+y+'</span>'+
        '<span class="sh-count">'+plural(count)+'</span></div>'+
        WEEKHEAD+rows+'</div>';
    }
    m++;if(m>11){m=0;y++;}
  }
  periodTitle.innerHTML=html?('<b>'+blocks+'</b> '+(blocks===1?'mes':'meses')+' \u00b7 <b>'+totalEv+'</b> sesiones'):'';
  calArea.innerHTML=html||'<div class="empty-msg">No hay eventos que coincidan con los filtros.</div>';
}

/* MODO SEMANA: cada semana como bloque (una fila de 7 columnas). */
function renderWeek(){
  const [min,max]=datasetBounds();
  let cur=startOfWeek(min);
  let html="",blocks=0,totalEv=0;
  while(cur<=max){
    const wr=weekRowHTML(cur,null);
    if(wr.count){
      blocks++;totalEv+=wr.count;
      const ws=new Date(cur),end=new Date(cur);end.setDate(end.getDate()+6);
      const sameMonth=ws.getMonth()===end.getMonth();
      const label=sameMonth
        ? (ws.getDate()+"\u2013"+end.getDate()+" "+MONTHS[ws.getMonth()]+" "+ws.getFullYear())
        : (ws.getDate()+" "+MONTHS[ws.getMonth()].slice(0,3)+" \u2013 "+end.getDate()+" "+MONTHS[end.getMonth()].slice(0,3)+" "+end.getFullYear());
      html+='<div class="section"><div class="section-head">'+
        '<span class="sh-sub">Semana</span><span class="sh-title" style="font-size:clamp(1.05rem,2.2vw,1.4rem)">'+label+'</span>'+
        '<span class="sh-count">'+plural(wr.count)+'</span></div>'+
        WEEKHEAD+wr.html+'</div>';
    }
    cur.setDate(cur.getDate()+7);
  }
  periodTitle.innerHTML=html?('<b>'+blocks+'</b> '+(blocks===1?'semana':'semanas')+' \u00b7 <b>'+totalEv+'</b> sesiones'):'';
  calArea.innerHTML=html||'<div class="empty-msg">No hay eventos que coincidan con los filtros.</div>';
}
function renderLegend(){
  const counts={};
  EVENTS.forEach(e=>{const dt=new Date(e.y,e.m,e.d);if(passFilters(e,dt))counts[e.subj]=(counts[e.subj]||0)+1;});
  const chips=Object.entries(SUBJ).filter(([k])=>counts[k]).map(([k,v])=>{
    const profTxt=v.prof!=="\u2014"?' \u00b7 <span class="prof">'+v.prof+'</span>':'';
    return '<span class="chip"><span class="dot" style="background:'+v.color+'"></span>'+v.name+profTxt+' <span class="cnt">'+counts[k]+'</span></span>';
  }).join("");
  document.getElementById("legendChips").innerHTML=chips||'<span class="chip">Sin coincidencias</span>';
}
function render(){
  if(!EVENTS.length){return;}
  if(state.view==="month")renderMonth();else renderWeek();
  renderLegend();
  const diff=state.tz-BASE_TZ;
  document.getElementById("tzLine").innerHTML=diff===0?('Mostrando horas en <b>'+state.tzLabel+'</b> \u2014 hora base del calendario.'):('Mostrando horas en <b>'+state.tzLabel+'</b> \u2014 '+(diff>0?'+':'')+diff+' h respecto a la hora base (Centroam\u00e9rica, UTC\u22126).');
}
// Posiciona el área de eventos en "hoy": deja lo anterior arriba (scroll up) y lo futuro abajo
function scrollToToday(){
  const ca=document.getElementById("calArea");
  if(!ca)return;
  let target=ca.querySelector(".daycell.today");
  if(!target){
    const today=keyOf(new Date());
    const cards=ca.querySelectorAll(".daycell");
    for(let i=0;i<cards.length;i++){ const c=cards[i]; if(c.classList.contains("out"))continue; if((c.dataset.date||"")>=today){ target=c; break; } }
  }
  if(!target){ ca.scrollTop=ca.scrollHeight; return; } // todo es pasado
  const sec=target.closest(".section");
  const head=sec?sec.querySelector(".section-head"):null;
  const off=head?head.offsetHeight:0;
  const caRect=ca.getBoundingClientRect(), tRect=target.getBoundingClientRect();
  ca.scrollTop += (tRect.top - caRect.top) - off - 6;
}
document.querySelectorAll(".seg.view-toggle button").forEach(b=>{b.onclick=()=>{document.querySelectorAll(".seg.view-toggle button").forEach(x=>x.classList.remove("active"));b.classList.add("active");state.view=b.dataset.view;saveState();render();};});
fMateria.onchange=e=>{state.materia=e.target.value;saveState();render();};
document.getElementById("fMes").onchange=e=>{state.month=e.target.value;state.week="all";populateWeeks();document.getElementById("fSemana").value="all";saveState();render();};
document.getElementById("fSemana").onchange=e=>{state.week=e.target.value;saveState();render();};
fProf.onchange=e=>{state.prof=e.target.value;saveState();render();};
document.getElementById("fDay").onchange=e=>{state.day=e.target.value;saveState();render();};
document.getElementById("fWeekend").onchange=e=>{state.weekend=e.target.checked;document.getElementById("fDay").disabled=e.target.checked;if(e.target.checked){document.getElementById("fDay").value="all";state.day="all";}saveState();render();};
document.getElementById("fTz").onchange=e=>{state.tz=Number(e.target.value);state.tzLabel=e.target.options[e.target.selectedIndex].text.replace(/ \u00b7.*/,'').trim();saveState();render();};
const _btn=document.getElementById("btnReload");if(_btn)_btn.onclick=()=>loadData();
function syncFilterBtns(){const t=document.getElementById("btnTasks"),x=document.getElementById("btnExams");if(t)t.classList.toggle("active",state.task);if(x)x.classList.toggle("active",state.exam);}
function toggleTasks(){state.task=!state.task;if(state.task)state.exam=false;syncFilterBtns();saveState();render();}
function toggleExams(){state.exam=!state.exam;if(state.exam)state.task=false;syncFilterBtns();saveState();render();}
function clearFilters(){
  state.materia="all";state.prof="all";state.day="all";state.month="all";state.week="all";state.weekend=false;state.task=false;state.exam=false;
  applyStateToControls();saveState();render();requestAnimationFrame(scrollToToday);
}
const _bt=document.getElementById("btnTasks");if(_bt)_bt.onclick=toggleTasks;
const _bx=document.getElementById("btnExams");if(_bx)_bx.onclick=toggleExams;
const _bc=document.getElementById("btnClear");if(_bc)_bc.onclick=clearFilters;
loadState();
loadData();
</script>
